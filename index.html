<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Status</title>
    <link rel="icon" href="images/weather-symbol.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Weather Status <img src="images/weather-symbol.png" alt="weather-symbol" width="55" height="38"></h1>
        <form>
            <input type="text" id="city-input" placeholder="Enter any city">
            <input type="submit" value="Get Weather">
        </form>
        <div id="weather-data">
            <div class="icon"></div>
            <div class="temperature"></div>
            <div class="description"></div>
            <div class="details"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
